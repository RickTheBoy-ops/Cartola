# Configurações do Sistema Cartola FC

api:
  base_url: "https://api.cartolafc.globo.com"
  timeout: 30
  max_retries: 5
  rate_limit_delay: 1.0

database:
  path: "data/cartola.db"
  backup_enabled: true

season:
  year: 2026

cache:
  clubes_ttl: 86400 # 24h
  mercado_status_ttl: 120 # 2min
  atletas_mercado_ttl: 300 # 5min
  partidas_ttl: 600 # 10min
  pontuados_ttl: 60 # 1min

ml:
  model_type: "rf" # 'rf' ou 'gb'
  train_window: 15 # rodadas para treino
  validation_split: 0.2
  historico_minimo: 30 # registros mínimos para ML

predictor:
  rf:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 10
  gb:
    n_estimators: 150
    learning_rate: 0.1
    max_depth: 5

optimizer:
  population_size: 250 # Aumentado para maior diversidade genética
  generations: 150 # Mais iterações para convergência
  mutation_rate: 0.20 # Maior exploração do espaço de soluções
  elite_size: 20 # Preservar mais soluções ótimas
  max_mesmo_clube: 3 # CRÍTICO: diversificação de clubes (protege de cartola ruim)
  penalidade_variancia: true # Penaliza atletas com alta variância de pontuação

  formacoes_disponiveis:
    - "3-4-3"
    - "3-5-2"
    - "4-3-3"
    - "4-4-2"
    - "4-5-1"
    - "5-3-2"
    - "5-4-1"

validacao:
  preco_minimo: 0.01
  posicoes_validas: [1, 2, 3, 4, 5, 6]
  status_validos: [7] # Apenas "Provável"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/cartola.log"
