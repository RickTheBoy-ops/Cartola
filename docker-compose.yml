version: '3.8'

services:
  cartola-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cartola_optimizer_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Hot-reload para desenvolvimento
      # Volume para persistir o banco de dados sqlite localmente
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - CARTOLA_EMAIL=${CARTOLA_EMAIL}
      - CARTOLA_PASSWORD=${CARTOLA_PASSWORD}
      - ODDS_API_KEY=${ODDS_API_KEY}
    command: uvicorn src.api.rest_app:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
